<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Envoir — sovereign mail, chat, calendar & files</title>
  <meta name="description" content="Envoir — one sovereign identity for mail, chat, calendar, contacts, files, and groups. Your key is your identity — no company holds it, no company can read your data or lock you in." />
  <meta name="theme-color" content="#4C4DFF" />
  <link rel="stylesheet" href="css/app.css" />

  <!-- Favicons — the Envoir mark (leaning e/at, Aurora Indigo gradient tile), see brand/README.md -->
  <link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="assets/favicon-48.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="assets/favicon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png" />
  <link rel="mask-icon" href="assets/logo-mono.svg" color="#4C4DFF" />

  <!-- Open Graph / Twitter card -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Envoir — sovereign mail, chat, calendar & files" />
  <meta property="og:description" content="One sovereign identity for mail, chat, calendar, contacts, files, and groups. Your key is your identity." />
  <meta property="og:image" content="assets/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Envoir — sovereign mail, chat, calendar & files" />
  <meta name="twitter:description" content="One sovereign identity for mail, chat, calendar, contacts, files, and groups. Your key is your identity." />
  <meta name="twitter:image" content="assets/og-image.png" />
</head>
<body>
  <!-- Onboarding overlay (shown until an identity exists) -->
  <div id="onboarding" class="overlay hidden"></div>

  <!-- Unified app shell (rail + workspace injected by shell.js) -->
  <div id="app" class="app hidden"></div>

  <!-- Global overlays -->
  <div id="modal" class="modal hidden"></div>
  <aside id="inspector" class="inspector hidden"></aside>
  <div id="toast" class="toast hidden"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
